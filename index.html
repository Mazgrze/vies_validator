<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU VAT Validator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>EU VAT Number Validator</h1>
    <input type="text" id="vatInput" placeholder="Enter VAT number (e.g., DE123456789)" maxlength="20">
    <button id="validateBtn">Validate</button>
    <div id="result"></div>
    <script src="renderer.js"></script>
</body>
</html>
