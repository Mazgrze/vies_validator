<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU VAT Validator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>EU VAT Validator</h1>
        <form id="vatForm">
            <label for="countryCode">Country Code:</label>
            <input type="text" id="countryCode" placeholder="e.g. PL" maxlength="2" required>

            <label for="vatNumber">VAT Number:</label>
            <input type="text" id="vatNumber" placeholder="e.g. 1234567890" required>

            <button type="submit">Validate</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
